<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>TurboGrafx16</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #111;
      color: white;
      text-align: center;
    }

    #player {
      padding: 20px;
    }

    #cover {
      width: 250px;
      height: 250px;
      object-fit: cover;
      margin-top: 10px;
      border-radius: 10px;
    }

    .song {
      padding: 10px;
      margin: 5px auto;
      width: 60%;
      background: #222;
      cursor: pointer;
      border-radius: 5px;
    }

    .song:hover {
      background: #333;
    }

    button {
      margin: 10px;
      padding: 10px 15px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div id="player">

  <!-- BACK BUTTON -->
  <button onclick="goBack()">⬅ Back to Library</button>

  <!-- ALBUM INFO -->
  <h1 id="albumTitle">Album Title</h1>
  <img id="cover" src="" alt="cover">

  <!-- SONG LIST -->
  <div id="songs"></div>

</div>

<audio id="audio"></audio>

<button id="playPauseBtn" onclick="togglePlay()">▶️ Play</button>

<script>

let currentAlbum = {
  name: "TurboGrafx16",
  cover: "turbografx16cover.jpg",
  songs: [
      { file: "welcometoucla.mp3", title: "Welcome To UCLA", artist: "Kanye West" },
      { file: "cantlookintomyeyes.mp3", title: "Can't Look Into My Eyes", artist: "Kanye West, Kid Cudi" },
      { file: "tongues.mp3", title: "Tongues", artist: "Kanye West" },
      {
        title: "All Eyes On Ye",
        versions: [
      {
        version: "V2",
        file: "alleyesonyev2.mp3",
        artist: "Kanye West, Kid Cudi"
      },
      {
        version: "V1",
        file: "alleyesonye.mp3",
        artist: "Kanye West"
      }
    ]
  },
      { file: "richniggadrunk.mp3", title: "Rich Nigga Drunk", artist: "Kanye West, Tyga" },
      { file: "timmyturnerremix.mp3", title: "Timmy Turner (Remix)", artist: "Kanye West, Desiigner" },
      { file: "canubeturbografx16version.mp3", title: "Can U Be", artist: "Kanye West, Travis Scott, Kirby Lauryen" },
      { file: "noreason.mp3", title: "No Reason", artist: "Kanye West, Post Malone, Justin Bieber" },
      { file: "holdtightturbografx16.mp3", title: "Hold Tight", artist: "Kanye West, Migos, Young Thug" },
      { file: "feelme.mp3", title: "Feel Me", artist: "Kanye West, Tyga" },
      { file: "mylevel.mp3", title: "My Level", artist: "Kanye West, Lil Yachty, Tyler, The Creator" },
      { file: "switchhands.mp3", title: "Switch Hands", artist: "Kanye West, A$AP Rocky, Future" },
      { file: "accelerate.mp3", title: "Accelerate", artist: "Kanye West, Christina Aguilera, Ty Dolla $ign, 2 Chainz" },
      { file: "alliknow.mp3", title: "All I Know", artist: "Kanye West, Future, The Weeknd" }
  ]
};

// BACK BUTTON (PUT MAIN REPO LINK HERE)
function goBack() {
  window.location.href = "https://peace345.github.io/Ye-Unreleased-Archive/"; // <-- paste main library repo URL here
}

// LOAD ALBUM
document.getElementById("albumTitle").innerText = currentAlbum.name;
document.getElementById("cover").src = currentAlbum.cover;

buildSongs();

// BUILD SONG LIST
function buildSongs() {
  const songsDiv = document.getElementById("songs");
  songsDiv.innerHTML = "";

  currentAlbum.songs.forEach((song, i) => {

    // SONG WITH MULTIPLE VERSIONS
    if (song.versions) {

      const group = document.createElement("div");
      group.className = "song";

      group.innerHTML = `<strong>${song.title} ▼</strong>`;

      group.onclick = () => {

        // prevent duplicates
        if (group.dataset.opened) return;
        group.dataset.opened = true;

        song.versions.forEach(version => {

          const div = document.createElement("div");
          div.className = "song";

          div.innerHTML = `
            <div style="display:flex; align-items:center;">
              <div style="width:60px;">
                <strong>${version.version}</strong>
              </div>

              <div style="flex:1; text-align:center;">
                <strong>${song.title}</strong><br>
                <small>${version.artist}</small>
              </div>
            </div>
          `;

          div.onclick = (e) => {
            e.stopPropagation();

            window.audio.src = version.file;
            window.audio.play();

            updateMediaSession({
              title: song.title,
              artist: version.artist
            });
          };

          group.after(div);

        });

      };

      songsDiv.appendChild(group);

    }

    // NORMAL SONG
    else {

      const div = document.createElement("div");
      div.className = "song";

      div.innerHTML = `
        <strong>${song.title}</strong><br>
        <small>${song.artist || ""}</small>
      `;

      div.onclick = () => playSong(i);

      songsDiv.appendChild(div);

    }

  });

}

// PLAY SONG
function playSong(i) {

  // Skip version groups
  while (
    i < currentAlbum.songs.length &&
    currentAlbum.songs[i].versions
  ) {
    i++;
  }

  // Loop back to beginning if needed
  if (i >= currentAlbum.songs.length) {
    i = 0;

    while (
      i < currentAlbum.songs.length &&
      currentAlbum.songs[i].versions
    ) {
      i++;
    }
  }

  currentIndex = i;

  const song = currentAlbum.songs[i];

  window.audio.src = song.file;
  window.audio.play();

  updateMediaSession(song, currentAlbum);
}

function updateMediaSession(song) {
  if (!('mediaSession' in navigator)) return;

  navigator.mediaSession.metadata = new MediaMetadata({
    title: song.title,
    artist: song.artist,
    album: currentAlbum.name,
    artwork: [
      { src: currentAlbum.cover, sizes: "512x512", type: "image/jpg" }
    ]
  });

  navigator.mediaSession.setActionHandler("play", () => {
    audio.play();
  });

  navigator.mediaSession.setActionHandler("pause", () => {
    audio.pause();
  });

  navigator.mediaSession.setActionHandler("previoustrack", () => {
    if (!currentAlbum) return;
    currentIndex = (currentIndex - 1 + currentAlbum.songs.length) % currentAlbum.songs.length;
    playSong(currentIndex);
  });

  navigator.mediaSession.setActionHandler("nexttrack", () => {
    if (!currentAlbum) return;
    currentIndex = (currentIndex + 1) % currentAlbum.songs.length;
    playSong(currentIndex);
  });
}

  if ("mediaSession" in navigator) {

  navigator.mediaSession.setActionHandler("play", async () => {
    await audio.play();
  });

  navigator.mediaSession.setActionHandler("pause", () => {
    audio.pause();
  });

}

function togglePlay() {
  if (audio.paused) {
    audio.play();
  } else {
    audio.pause();
  }
}

  audio.addEventListener("play", () => {
  document.getElementById("playPauseBtn").innerText = "⏸️ Pause";
});

audio.addEventListener("pause", () => {
  document.getElementById("playPauseBtn").innerText = "▶️ Play";
});

window.addEventListener("DOMContentLoaded", () => {

  const audio = document.getElementById("audio");

  audio.addEventListener("ended", () => {
  if (!currentAlbum) return;

  const list = getPlayableSongs();

  const currentSong = currentAlbum.songs[currentIndex];
  const nextIndex = list.indexOf(currentSong) + 1;

  if (nextIndex < list.length) {
    const nextSong = list[nextIndex];

    const realIndex = currentAlbum.songs.indexOf(nextSong);
    playSong(realIndex);
  } else {
    playSong(currentAlbum.songs.indexOf(list[0]));
  }
});

  // expose audio globally so playSong can use it safely
  window.audio = audio;
});

function getPlayableSongs() {
  const list = [];

  currentAlbum.songs.forEach(song => {
    if (song.versions) {
      // skip the container entirely
      return;
    }
    list.push(song);
  });

  return list;
}
  
</script>

</body>
</html>
